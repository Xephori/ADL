
data:
  video_dir: "data/dataset/SL"
  num_frames: 16
  image_size: 224
  num_workers: 2
  seed: 42


model:
  name: "model_c"
  num_classes: 10
  cnn_blocks: 4
  cnn_channels: [32, 64, 128, 256]
  feature_dim: 256
  lstm_hidden_size: 128
  lstm_num_layers: 1
  lstm_bidirectional: true
  lstm_dropout: 0.0
  attention_hidden_dim: 64
  classifier_dropout: 0.3

# --- Training ---
training:
  batch_size: 8
  epochs: 100
  learning_rate: 0.001      # 1e-3 (validated by hyperparam search: 66% vs 48% at 5e-3)
  weight_decay: 0.0001
  label_smoothing: 0.1
  mixup_alpha: 0.2
  optimizer: "adam"          # adam | adamw
  scheduler: "step"         # step | cosine
  step_size: 50             # for StepLR
  step_gamma: 0.5           # for StepLR
  early_stopping_patience: 100  # effectively disabled — train all epochs
  grad_clip: 1.0            # gradient clipping for LSTM stability
  use_class_weights: false   # disabled — can destabilize early training with small dataset

# --- Paths ---
paths:
  save_dir: "saved_models"
  results_dir: "results"
  log_csv: "results/training_log.csv"
