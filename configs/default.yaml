# Default configuration 
data:
  video_dir: "data/dataset/SL"
  num_frames: 16          
  image_size: 224         
  num_workers: 0  
  seed: 42

model:
  name: "model_a"         
  num_classes: 10         
  cnn_blocks: 4
  cnn_channels: [32, 64, 128, 256]   
  feature_dim: 256
  lstm_hidden_size: 128   
  lstm_num_layers: 1     
  lstm_bidirectional: true
  lstm_dropout: 0.0
  attention_hidden_dim: 64           
  classifier_dropout: 0.3
  pretrained_cnn_path: ""            
  freeze_cnn: false                  

# Training
training:
  batch_size: 8
  epochs: 200
  learning_rate: 0.0005   
  weight_decay: 0.0001
  label_smoothing: 0.1    
  mixup_alpha: 0.0        
  optimizer: "adam"       
  scheduler: "step"       
  step_size: 50           
  step_gamma: 0.5
  early_stopping_patience: 100   
  grad_clip: 1.0          
  use_class_weights: false        

#Paths
paths:
  save_dir: "saved_models"
  results_dir: "results"
  log_csv: "results/training_log.csv"
